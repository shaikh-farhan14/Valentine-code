<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valentine's Day</title>
    <link rel="stylesheet" href="./propose.css">
</head>
<body>
    <div class="container">
        <div id="valentine-question">
            <h1>Do you Love me ?❤️</h1>
            <div class="buttons">
                <button id="yes-btn">Yes</button>
                <button id="no-btn">No</button>
            </div>
        </div>
        <!-- Success message (hidden by default) -->
        <div id="success-message" class="hidden">
            <h1>Yay! I knew you'd say yes! 🥰</h1>
            <img src="https://media.tenor.com/xHkz_fvW36cAAAAM/sami-en-dina-sami-dina.gif" alt="Happy Dance">
        </div>
    </div>
    <script src="./propose.js"></script>
</body>
</html>
